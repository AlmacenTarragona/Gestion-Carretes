<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Carretes</title>

<style>

body{
    font-family: Arial;
    margin:20px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
}

th{
    background:#f4f4f4;
}

.estado-fuera{
    color:red;
    font-weight:bold;
}

.estado-dentro{
    color:green;
    font-weight:bold;
}

</style>
</head>
<body>

<h1>Control de Carretes</h1>

<button onclick="cargarDatos()">
    Cargar datos
</button>

<br><br>

<table id="tabla"></table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwvj0UYj1a2Y0pthRwn0wMgQqJxgUOyFkJJyeN51a8MIyN8vmt1dUBRqlR4trcqVX-w/exec";

async function cargarDatos(){

    const response = await fetch(API_URL);
    const datos = await response.json();

    let html = "";

    datos.forEach((fila,index)=>{

        html += "<tr>";

        fila.forEach(celda=>{

            if(index===0){

                html += `<th>${celda}</th>`;

            }else{

                let clase = "";

                if(String(celda).toLowerCase()==="fuera"){
                    clase="estado-fuera";
                }

                if(String(celda).toLowerCase()==="dentro"){
                    clase="estado-dentro";
                }

                html += `<td class="${clase}">${celda}</td>`;
            }

        });

        html += "</tr>";
    });

    document.getElementById("tabla").innerHTML = html;
}

</script>

</body>
</html>
