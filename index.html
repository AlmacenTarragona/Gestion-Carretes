<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Carretes</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="header-left">

        <h1>📦 Control de Carretes</h1>

        <span class="subtitulo">
            Inventario y Movimientos
        </span>

    </div>

    <div class="header-right">

        <button
            class="btn btn-primary"
            onclick="abrirNuevoCarrete()">

            ➕ Nuevo Carrete

        </button>

    </div>

</header>


<!-- DASHBOARD -->

<section class="dashboard">

    <div
        class="card card-total"
        onclick="filtrarEstado('')">

        <span>Total</span>

        <h2 id="total">
            0
        </h2>

    </div>

    <div
        class="card card-almacen"
        onclick="filtrarEstado('En Almacén')">

        <span>En Almacén</span>

        <h2 id="almacen">
            0
        </h2>

    </div>

    <div
        class="card card-fuera"
        onclick="filtrarEstado('Fuera')">

        <span>Fuera</span>

        <h2 id="fuera">
            0
        </h2>

    </div>

    <div
        class="card card-vacia"
        onclick="filtrarEstado('Vacía')">

        <span>Vacía</span>

        <h2 id="vacia">
            0
        </h2>

    </div>

</section>


<!-- FILTROS -->

<section class="toolbar">

    <input
        type="text"
        id="buscar"
        placeholder="Buscar lote, producto o descripción...">

    <button
        class="btn btn-light"
        onclick="limpiarFiltros()">

        Limpiar

    </button>

</section>


<!-- TABLA -->

<section class="tabla-container">

    <table>

        <thead>

            <tr>

                <th>LOTE</th>

                <th>PRODUCTO</th>

                <th>DESCRIPCIÓN</th>

                <th>METROS</th>

                <th>PI</th>

                <th>ESTADO</th>

                <th>ACCIONES</th>

            </tr>

        </thead>

        <tbody id="tabla">

        </tbody>

    </table>

</section>


<!-- MODAL -->

<div
    id="modalOverlay"
    class="modal-overlay oculto">

    <div
        id="modalContent"
        class="modal">

    </div>

</div>


<!-- LOADER -->

<div
    id="loader"
    class="loader oculto">

    Cargando...

</div>


<!-- JS -->

<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/tabla.js"></script>

<script src="js/modales.js"></script>

<script src="js/app.js"></script>

</body>

</html>
