<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Carretes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

<h1>Control de Carretes</h1>

<button onclick="cargarDatos()">
    Cargar datos
</button>

<table id="tabla"></table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz9aZntM0lUihG33WOfa9cOQbZEl7FQZV6GxaoO5G0u3aeJ1IgSyheDJMbJuAf353Ra/exec";

async function cargarDatos() {

    const response = await fetch(API_URL);

    const datos = await response.json();

    const tabla = document.getElementById("tabla");

    tabla.innerHTML = "";

    datos.forEach((fila, indice) => {

        const tr = document.createElement("tr");

        fila.forEach(celda => {

            const elemento =
                document.createElement(
                    indice === 0 ? "th" : "td"
                );

            elemento.textContent = celda;

            tr.appendChild(elemento);

        });

        tabla.appendChild(tr);

    });
}

</script>

</body>
</html>
