<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Carretes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#f1f5f9;
    color:#1e293b;
}

header{
    background:#0f172a;
    color:white;
    padding:20px 30px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

header h1{
    font-size:28px;
}

/* DASHBOARD */

.dashboard{
    position:sticky;
    top:0;
    z-index:1000;
    background:#f1f5f9;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    border-radius:16px;
    padding:20px;
    color:white;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-3px);
}

.card h3{
    font-size:14px;
    text-transform:uppercase;
    opacity:.85;
}

.card h2{
    margin-top:10px;
    font-size:42px;
}

.card-total{
    background:linear-gradient(135deg,#0f172a,#334155);
}

.card-almacen{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

.card-fuera{
    background:linear-gradient(135deg,#dc2626,#ef4444);
}

.card-vacia{
    background:linear-gradient(135deg,#4b5563,#6b7280);
}

/* FILTROS */

.filtros{
    position:sticky;
    top:160px;
    z-index:999;

    margin:20px;
    padding:15px;

    background:white;

    border-radius:12px;

    display:flex;
    flex-wrap:wrap;
    gap:10px;

    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.filtros input,
.filtros select{

    padding:12px;

    border:1px solid #cbd5e1;

    border-radius:8px;

    font-size:14px;
}

/* TABLA */

.tabla-container{

    margin:20px;

    background:white;

    border-radius:12px;

    overflow:auto;

    max-height:70vh;

    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead th{

    position:sticky;
    top:0;

    background:#0f172a;

    color:white;

    padding:14px;

    text-align:left;

    z-index:10;
}

tbody td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
}

tbody tr:hover{
    background:#f8fafc;
}

/* ESTADOS */

.estado-almacen{
    background:#dcfce7 !important;
}

.estado-fuera{
    background:#fee2e2 !important;
}

.estado-vacia{
    background:#e5e7eb !important;
}

.badge{
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.badge-almacen{
    background:#16a34a;
    color:white;
}

.badge-fuera{
    background:#dc2626;
    color:white;
}

.badge-vacia{
    background:#6b7280;
    color:white;
}

/* BOTONES */

.btn{

    border:none;

    padding:8px 14px;

    border-radius:8px;

    cursor:pointer;

    font-weight:600;
}

.btn-salida{
    background:#dc2626;
    color:white;
}

.btn-entrada{
    background:#16a34a;
    color:white;
}

.btn:hover{
    opacity:.9;
}

/* RESPONSIVE */

@media(max-width:768px){

    .card h2{
        font-size:32px;
    }

    .filtros{
        top:250px;
    }

}

</style>
</head>

<body>

<header>
    <h1>📦 Control de Carretes</h1>
</header>

<div class="dashboard">

    <div class="cards">

        <div class="card card-total">
            <h3>Total</h3>
            <h2 id="total">0</h2>
        </div>

        <div class="card card-almacen">
            <h3>En Almacén</h3>
            <h2 id="almacen">0</h2>
        </div>

        <div class="card card-fuera">
            <h3>Fuera</h3>
            <h2 id="fuera">0</h2>
        </div>

        <div class="card card-vacia">
            <h3>Vacías</h3>
            <h2 id="vacia">0</h2>
        </div>

    </div>

</div>

<div class="filtros">

    <input
        id="buscar"
        type="text"
        placeholder="Buscar lote...">

    <select id="estadoFiltro">
        <option value="">Todos los estados</option>
        <option value="En Almacén">En Almacén</option>
        <option value="Fuera">Fuera</option>
        <option value="Vacía">Vacía</option>
    </select>

</div>

<div class="tabla-container">

<table>

<thead>

<tr>
    <th>LOTE</th>
    <th>PRODUCTO</th>
    <th>DESCRIPCIÓN</th>
    <th>METROS</th>
    <th>ESTADO</th>
    <th>ACCIÓN</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbznOEHikdjZFZwd7solq_S2awq5EOTrLx0Q9yRaWhPk4YW8Ug_70Kt6hh226NmMeT0/exec";

let datos = [];

async function cargar(){

    try{

        const response = await fetch(API);

        datos = await response.json();

        actualizarDashboard();

        render();

    }catch(error){

        console.error(error);

        alert("Error cargando datos");

    }

}

function actualizarDashboard(){

    document.getElementById("total").textContent =
        datos.length;

    document.getElementById("almacen").textContent =
        datos.filter(x =>
            x.Estado === "En Almacén").length;

    document.getElementById("fuera").textContent =
        datos.filter(x =>
            x.Estado === "Fuera").length;

    document.getElementById("vacia").textContent =
        datos.filter(x =>
            x.Estado === "Vacía").length;
}

function render(){

    const texto =
        document.getElementById("buscar")
        .value
        .toLowerCase();

    const estadoFiltro =
        document.getElementById("estadoFiltro")
        .value;

    let html = "";

    datos

    .filter(item => {

        const coincideLote =
            String(item.LOTE)
            .toLowerCase()
            .includes(texto);

        const coincideEstado =
            !estadoFiltro ||
            item.Estado === estadoFiltro;

        return coincideLote &&
               coincideEstado;

    })

    .forEach(item => {

        let claseFila = "";
        let badge = "";
        let accion = "";

        switch(item.Estado){

            case "En Almacén":

                claseFila = "estado-almacen";

                badge =
                `<span class="badge badge-almacen">
                    En Almacén
                </span>`;

                accion =
                `<button
                    class="btn btn-salida"
                    onclick="salida('${item.LOTE}')">
                    ⬆ Salida
                </button>`;

                break;

            case "Fuera":

                claseFila = "estado-fuera";

                badge =
                `<span class="badge badge-fuera">
                    Fuera
                </span>`;

                accion =
                `<button
                    class="btn btn-entrada"
                    onclick="entrada('${item.LOTE}')">
                    ⬇ Entrada
                </button>`;

                break;

            case "Vacía":

                claseFila = "estado-vacia";

                badge =
                `<span class="badge badge-vacia">
                    Vacía
                </span>`;

                accion = "-";

                break;
        }

        html += `
        <tr class="${claseFila}">

            <td>${item.LOTE || ""}</td>

            <td>${item.PRODUCTO || ""}</td>

            <td>${item.DESCRIPCION || ""}</td>

            <td>${item.METROS || ""}</td>

            <td>${badge}</td>

            <td>${accion}</td>

        </tr>
        `;
    });

    document.getElementById("tabla").innerHTML =
        html;
}

async function actualizarEstado(lote, estado){

    await fetch(API,{
        method:"POST",
        body:JSON.stringify({
            lote,
            estado
        })
    });

    await cargar();
}

async function salida(lote){

    const confirmar =
        confirm(
            `¿Registrar salida del lote ${lote}?`
        );

    if(!confirmar) return;

    await actualizarEstado(
        lote,
        "Fuera"
    );
}

async function entrada(lote){

    const opcion =
        prompt(
`Seleccione estado final:

1 = En Almacén
2 = Vacía`
        );

    if(opcion === "1"){

        await actualizarEstado(
            lote,
            "En Almacén"
        );
    }

    if(opcion === "2"){

        await actualizarEstado(
            lote,
            "Vacía"
        );
    }
}

document
.getElementById("buscar")
.addEventListener("input",render);

document
.getElementById("estadoFiltro")
.addEventListener("change",render);

cargar();

</script>

</body>
</html>
